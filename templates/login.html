<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahfeel Business Solutions — CRM</title>
  <link rel="icon" href="/static/img/logo_white.png" type="image/png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      background:#F1F5F9;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'DM Sans',system-ui,sans-serif;
      padding:20px;
    }
    .card {
      background:white;
      border-radius:16px;
      padding:48px 44px;
      width:100%;
      max-width:400px;
      border:1px solid #E8EEF4;
      text-align:center;
    }
    .logo-box {
      text-align:center;
      margin-bottom:20px;
    }
    .logo-box img { height:70px; width:auto; object-fit:contain; }
    .brand {
      font-size:11px;
      font-weight:600;
      color:#94A3B8;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .welcome {
      font-size:24px;
      font-weight:700;
      color:#1A2333;
      margin-bottom:4px;
    }
    .sub {
      font-size:13px;
      color:#94A3B8;
      margin-bottom:32px;
    }
    .flash-msg {
      background:#FEF2F2;
      border:1px solid #FECACA;
      color:#B91C1C;
      padding:10px 14px;
      border-radius:8px;
      font-size:13px;
      margin-bottom:20px;
      text-align:left;
    }
    .field { text-align:left; margin-bottom:16px; }
    .field label {
      display:block;
      font-size:11px;
      font-weight:600;
      color:#64748B;
      text-transform:uppercase;
      letter-spacing:0.5px;
      margin-bottom:6px;
    }
    .field input {
      width:100%;
      height:42px;
      background:#F8FAFC;
      border:1.5px solid #E2E8F0;
      border-radius:8px;
      padding:0 14px;
      font-size:14px;
      color:#1A2333;
      outline:none;
      transition:border-color .2s;
    }
    .field input:focus { border-color:#1A3B8B; background:white; }
    .btn-login {
      width:100%;
      height:44px;
      background:#1A3B8B;
      color:white;
      border:none;
      border-radius:8px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      margin-top:8px;
      transition:background .2s;
    }
    .btn-login:hover { background:#0F2660; }
    .footer {
      font-size:11px;
      color:#CBD5E1;
      margin-top:32px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-box">
      <img src="/static/img/logo_color.jpg" alt="Tahfeel" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
      <div id="logo-fallback" style="display:none;font-size:22px;font-weight:700;color:#1A3B8B;">Tahfeel Business Solutions</div>
    </div>
    <div class="brand">Tahfeel Business Solutions</div>
    <div class="welcome">Welcome back</div>
    <div class="sub">Sign in to your CRM</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for msg in messages %}
        <div class="flash-msg">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="post">
      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" value="{{ email or '' }}" placeholder="your@tahfeel.ae" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="footer">© 2026 Tahfeel Business Solutions · Dubai, UAE</div>
  </div>
</body>
</html>
